<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * {
        color-scheme: dark only;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 0.5rem;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #1a1a1a;
        color: #e0e0e0;
      }

      .container {
        max-width: 960px;
        margin: 0 auto;
      }

      .title {
        font-size: 1.5rem;
        font-weight: 700;
        margin: 0 0 0.25rem;
        color: #f0f0f0;
      }

      .subtitle {
        font-size: 0.875rem;
        color: #999;
        margin: 0 0 1.25rem;
        line-height: 1.4;
      }

      .controls {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        margin-bottom: 1.25rem;
      }

      .control-group {
        display: flex;
        flex-direction: column;
        gap: 0.375rem;
      }

      .label {
        font-size: 0.8rem;
        font-weight: 600;
        color: #bbb;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .file-input-wrapper {
        position: relative;
        display: flex;
        align-items: center;
      }

      .file-input {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
        z-index: 1;
      }

      .file-input-label,
      .file-input-label {
        display: block;
        width: 100%;
        padding: 0.5rem 0.75rem;
        background: #2a2a2a;
        border: 1px dashed #555;
        border-radius: 6px;
        font-size: 0.85rem;
        color: #888;
        pointer-events: none;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .select {
        padding: 0.5rem 0.75rem;
        background: #2a2a2a;
        border: 1px solid #444;
        border-radius: 6px;
        color: #e0e0e0;
        font-size: 0.85rem;
        cursor: pointer;
        outline: none;
      }

      .select:focus {
        border-color: #6b8afd;
      }

      .algo-description {
        font-size: 0.75rem;
        color: #777;
        margin: 0;
      }

      .btn {
        padding: 0.6rem 1.25rem;
        background: #4a6cf7;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s, opacity 0.2s;
        align-self: flex-start;
      }

      .btn:hover:not(:disabled) {
        background: #3b5de7;
      }

      .btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .preview-container {
        margin-top: 0.375rem;
      }

      .preview-image {
        max-width: 200px;
        max-height: 120px;
        border-radius: 6px;
        border: 1px solid #333;
        object-fit: contain;
      }

      .folder-info {
        font-size: 0.75rem;
        color: #777;
        max-height: 3rem;
        overflow-y: auto;
        word-break: break-all;
      }

      /* Progress */
      .progress {
        position: relative;
        height: 1.25rem;
        background: #2a2a2a;
        border-radius: 6px;
        overflow: hidden;
        margin-bottom: 1rem;
      }

      .progress-bar {
        height: 100%;
        background: linear-gradient(90deg, #4a6cf7, #6b8afd);
        transition: width 0.15s ease;
        border-radius: 6px;
      }

      .progress-text {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.7rem;
        font-weight: 600;
        color: #fff;
        text-shadow: 0 1px 2px rgba(0,0,0,0.5);
      }

      /* Results */
      .results-title {
        font-size: 1.1rem;
        font-weight: 600;
        margin: 0 0 0.75rem;
        color: #ddd;
      }

      .results-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 0.75rem;
      }

      .result-card {
        position: relative;
        background: #222;
        border: 1px solid #333;
        border-radius: 8px;
        overflow: hidden;
        transition: border-color 0.2s;
      }

      .result-card.top-result {
        border-color: #4a6cf7;
      }

      .result-card .rank {
        position: absolute;
        top: 0.375rem;
        left: 0.375rem;
        background: rgba(0,0,0,0.7);
        color: #fff;
        font-size: 0.7rem;
        font-weight: 700;
        padding: 0.15rem 0.4rem;
        border-radius: 4px;
        z-index: 1;
      }

      .result-card.top-result .rank {
        background: #4a6cf7;
      }

      .result-image {
        width: 100%;
        height: 120px;
        object-fit: cover;
        display: block;
      }

      .result-info {
        padding: 0.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
      }

      .result-name {
        font-size: 0.7rem;
        color: #aaa;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .score-bar-container {
        height: 4px;
        background: #333;
        border-radius: 2px;
        overflow: hidden;
      }

      .score-bar {
        height: 100%;
        background: #4a6cf7;
        border-radius: 2px;
        transition: width 0.3s ease;
      }

      .result-score {
        font-size: 0.75rem;
        font-weight: 600;
        color: #ccc;
      }

      .error {
        padding: 0.75rem;
        background: #3a1a1a;
        border: 1px solid #6a2a2a;
        border-radius: 6px;
        color: #f88;
        font-size: 0.85rem;
      }

      .no-results {
        color: #777;
        font-size: 0.85rem;
      }

      .cv-status {
        font-size: 0.8rem;
        color: #888;
        margin-bottom: 1rem;
        padding: 0.4rem 0.6rem;
        background: #222;
        border-radius: 4px;
        display: inline-block;
      }

      .cv-status.ready {
        color: #6f6;
        background: #1a2a1a;
      }

      .cv-status.error {
        color: #f88;
        background: #2a1a1a;
      }
    </style>
    <script>
      window.cvLoader = Promise.withResolvers();
      // OpenCV.js needs onRuntimeInitialized for WASM readiness
      // The script onload fires when JS is parsed, but WASM init is async
      var Module = {
        onRuntimeInitialized: function() {
          window.cvLoader.resolve();
        }
      };
    </script>
    <script
      async
      src="./opencv.js"
      onerror="cvLoader.reject()"
    ></script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
